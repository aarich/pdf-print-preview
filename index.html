<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Editor</title>
    <link rel="stylesheet" href="/styles/styles.css" />
    <link rel="stylesheet" href="/styles/drag-drop.css" />
  </head>
  <body>
    <div id="welcome-screen">
      <div class="welcome-content">
        <h1>PDF Editor</h1>
        <p class="subtitle">
          Prepare PDFs for double-sided printing with live book spread preview
        </p>

        <div class="features">
          <div class="feature">► Preview double-sided layout</div>
          <div class="feature">► Insert/delete pages</div>
          <div class="feature">► Book-style spreads</div>
          <div class="feature">► Zero quality loss</div>
        </div>

        <div class="upload-area">
          <input type="file" id="file-input" accept="application/pdf" hidden />
          <button id="upload-btn" class="primary-btn">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            Select File
          </button>
          <p class="drag-hint">drag & drop supported</p>
        </div>

        <a
          href="https://github.com/aarich/pdf-print-preview"
          target="_blank"
          class="github-link"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
            />
          </svg>
          Source Code
        </a>
      </div>
    </div>

    <div id="drop-overlay" class="hidden">
      <div class="drop-message">
        <svg
          width="64"
          height="64"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <h2>Drop PDF here</h2>
      </div>
    </div>

    <div id="app" class="hidden">
      <aside id="thumbnail-panel">
        <div class="panel-header">
          <h3>Pages</h3>
          <div id="page-stats"></div>
        </div>
        <div id="thumbnail-list"></div>
      </aside>

      <main id="main-view">
        <div id="spread-view">
          <div id="spread-container"></div>
        </div>

        <div id="controls">
          <div id="loading-indicator" class="hidden">
            <div class="loading-text">Rendering pages...</div>
            <div class="loading-bar">
              <div id="loading-progress" class="loading-fill"></div>
            </div>
          </div>
          <button id="reset-btn" class="action-btn" disabled>Reset</button>
          <button id="export-btn" class="action-btn export-btn" disabled>
            Download PDF
          </button>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
